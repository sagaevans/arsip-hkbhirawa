<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arsip Akuntansi HK Bhirawa</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">
      <div class="brand-icon">🗂️</div>
      <div>
        <div class="brand-name" data-nama>Arsip Akuntansi HK Bhirawa</div>
        <div class="brand-sub"  data-sub>Created By NasZ</div>
      </div>
    </a>
  </div>
</header>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-left">
      <div class="hero-eye">Manajemen Dokumen</div>
      <h1 class="hero-title">Daftar Dus Arsip Akuntansi</h1>
      <p class="hero-desc">Klik dus untuk melihat daftar dokumen di dalamnya.</p>
      <p class="hero-ket">★ Dokumen Milik Akuntansi</p>
      <div class="hero-stats">
        <div>
          <div class="stat-val" id="stat-dus">—</div>
          <div class="stat-lbl">Total Dus</div>
        </div>
        <div>
          <div class="stat-val" id="stat-dok">—</div>
          <div class="stat-lbl">Total Dokumen</div>
        </div>
      </div>
    </div>
    <div class="hero-logo">
      <img data-logo src="" alt="HK Bhirawa">
    </div>
  </div>
</section>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input id="s-input" type="search" placeholder="Cari dus…">
    </div>
    <select id="f-tahun" class="filter-sel">
      <option value="">Semua Tahun</option>
    </select>
    <span class="result-lbl" id="result-lbl"></span>
  </div>
</div>

<main class="main">
  <div class="cards-grid" id="cards-grid"></div>
</main>

<script src="js/data.js"></script>
<script src="js/index.js"></script>
</body>
</html>
