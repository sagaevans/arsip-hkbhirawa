<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detail Dus – Arsip HK Bhirawa</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

.detail-head{
display:flex!important;
flex-direction:row!important;
align-items:center!important;
gap:20px;
flex-wrap:nowrap!important;
padding:18px 22px!important;
}

/* kiri */

.dh-left{
width:160px;
flex-shrink:0;
}

.dh-left .detail-num{
font-size:11px;
}

.dh-left .detail-title{
font-size:13px;
line-height:1.3;
}

.dh-left .detail-ket{
font-size:11px;
margin-top:4px;
}

/* tengah */

.dh-mid{
flex:1;
display:flex;
flex-direction:row;
align-items:flex-end;
justify-content:center;
gap:40px;
}

/* tahun */

.badge-tahun-big{
font-family:'IBM Plex Mono',monospace;
font-size:110px;
font-weight:700;
line-height:1;
letter-spacing:-2px;
color:#000;
}

/* no dus */

.badge-no-wrap{
display:flex;
flex-direction:column;
align-items:center;
}

.badge-no-lbl{
font-family:'IBM Plex Mono',monospace;
font-size:18px;
font-weight:700;
margin-bottom:-10px;
}

.badge-no-big{
font-family:'IBM Plex Mono',monospace;
font-size:180px;
font-weight:700;
line-height:0.9;
letter-spacing:-4px;
color:#000;
}

/* qr */

.qr-box{
width:170px;
text-align:center;
}

/* print mode */

@media print{

.site-header,
.breadcrumb,
.nav-duo,
.no-print{
display:none!important;
}

.detail-head{
flex-wrap:nowrap!important;
}

.badge-tahun-big{
font-size:120px!important;
}

.badge-no-big{
font-size:200px!important;
}

}

@media(max-width:640px){

.detail-head{
flex-wrap:wrap!important;
}

.dh-left{
width:100%;
}

.badge-tahun-big{
font-size:70px;
}

.badge-no-big{
font-size:110px;
}

}

</style>
</head>

<body>

<header class="site-header">

<div class="header-inner">

<a class="brand" href="index.html">

<div class="brand-icon">🗂️</div>

<div>
<div class="brand-name">Arsip Akuntansi HK Bhirawa</div>
<div class="brand-sub">Created By NasZ</div>
</div>

</a>

<div class="header-actions">
<button class="btn btn-outline btn-sm" onclick="window.print()">🖨️ Print</button>
</div>

</div>

</header>

<main class="main">

<nav class="breadcrumb">

<a href="index.html">🏠 Beranda</a>

<span class="bc-sep">›</span>

<span id="d-num">—</span>

</nav>

<div class="nav-duo">

<a id="nav-prev" class="btn btn-ghost btn-sm" href="#">← Sebelumnya</a>

<a id="nav-next" class="btn btn-ghost btn-sm" href="#">Berikutnya →</a>

</div>

<div class="detail-card">

<div class="detail-head">

<div class="dh-left">

<div class="detail-num" id="d-num">—</div>

<div class="detail-title" id="d-title">—</div>

<div class="detail-ket">★ Dokumen Milik Akuntansi</div>

</div>

<div class="dh-mid">

<span class="badge-tahun-big" id="badge-tahun">—</span>

<div class="badge-no-wrap">

<span class="badge-no-lbl">No Dus</span>

<span class="badge-no-big" id="badge-label">—</span>

</div>

</div>

<div class="qr-box">

<div id="qr-render"></div>

<button class="btn btn-outline btn-sm no-print" onclick="window.print()">🖨️ Print</button>

</div>

</div>

<div class="meta-bar">

<div class="meta-item">
<span class="meta-key">Tahun</span>
<span class="meta-val" id="d-tahun">—</span>
</div>

<div class="meta-item">
<span class="meta-key">Jumlah Dokumen</span>
<span class="meta-val" id="d-total">—</span>
</div>

</div>

</div>

<div class="table-wrap">

<div class="table-head">

<span class="table-head-title">📄 DAFTAR DOKUMEN — <span id="doc-count">—</span></span>

<div class="search-wrap no-print" style="max-width:240px">

<span class="search-ico">🔍</span>

<input id="doc-search" type="search" placeholder="Cari dokumen…">

</div>

</div>

<table>

<thead>
<tr>
<th style="width:44px">No</th>
<th>Nama Dokumen</th>
</tr>
</thead>

<tbody id="doc-body">
<tr>
<td colspan="2" style="padding:40px;text-align:center;color:var(--muted)">Memuat data…</td>
</tr>
</tbody>

</table>

</div>

</main>

<script src="js/data.js"></script>
<script src="js/dus.js"></script>

</body>
</html>
