<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detail Dus – Arsip HK Bhirawa</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

/* HEADER */

.detail-head{
display:grid;
grid-template-columns:180px 420px 200px;
align-items:center;
gap:20px;
padding:20px;
}

/* INFO KIRI */

.dh-left{
font-size:12px;
line-height:1.4;
}

.detail-title{
font-weight:600;
}

/* AREA ANGKA */

.dh-mid{
display:flex;
align-items:flex-end;
justify-content:center;
gap:20px;
width:420px;
overflow:hidden;
}

/* TAHUN */

.badge-tahun-big{
font-family:'IBM Plex Mono',monospace;
font-size:90px;
font-weight:700;
line-height:1;
}

/* NO DUS */

.badge-no-wrap{
display:flex;
flex-direction:column;
align-items:center;
}

.badge-no-lbl{
font-size:18px;
font-weight:700;
margin-bottom:-5px;
}

.badge-no-big{
font-family:'IBM Plex Mono',monospace;
font-size:170px;
font-weight:700;
line-height:0.85;
max-width:160px;
text-align:center;
}

/* QR */

.qr-box{
width:200px;
min-width:200px;
display:flex;
flex-direction:column;
align-items:center;
}

#qr-render{
width:170px;
height:170px;
}

/* PRINT MODE */

@media print{

.site-header,
.breadcrumb,
.nav-duo,
.no-print{
display:none!important;
}

.detail-head{
grid-template-columns:180px 420px 200px;
}

}

</style>
</head>

<body>

<header class="site-header">
<div class="header-inner">

<a class="brand" href="index.html">
<div class="brand-icon">🗂️</div>

<div>
<div class="brand-name">Arsip Akuntansi HK Bhirawa</div>
<div class="brand-sub">Created By NasZ</div>
</div>
</a>

<div class="header-actions">
<button class="btn btn-outline btn-sm" onclick="window.print()">🖨️ Print</button>
</div>

</div>
</header>

<main class="main">

<nav class="breadcrumb">
<a href="index.html">🏠 Beranda</a>
<span class="bc-sep">›</span>
<span id="d-num">—</span>
</nav>

<div class="nav-duo">
<a id="nav-prev" class="btn btn-ghost btn-sm" href="#">← Sebelumnya</a>
<a id="nav-next" class="btn btn-ghost btn-sm" href="#">Berikutnya →</a>
</div>

<div class="detail-card">

<div class="detail-head">

<!-- KIRI -->

<div class="dh-left">
<div id="d-num">—</div>
<div class="detail-title" id="d-title">—</div>
<div>★ Dokumen Milik Akuntansi</div>
</div>

<!-- TENGAH -->

<div class="dh-mid">

<span class="badge-tahun-big" id="badge-tahun">—</span>

<div class="badge-no-wrap">
<div class="badge-no-lbl">No Dus</div>
<div class="badge-no-big" id="badge-label">—</div>
</div>

</div>

<!-- KANAN -->

<div class="qr-box">
<div id="qr-render"></div>
<button class="btn btn-outline btn-sm no-print" onclick="window.print()">🖨️ Print</button>
</div>

</div>

<div class="meta-bar">

<div class="meta-item">
<span class="meta-key">Tahun</span>
<span class="meta-val" id="d-tahun">—</span>
</div>

<div class="meta-item">
<span class="meta-key">Jumlah Dokumen</span>
<span class="meta-val" id="d-total">—</span>
</div>

</div>

</div>

<div class="table-wrap">

<div class="table-head">
<span class="table-head-title">
📄 DAFTAR DOKUMEN — <span id="doc-count">—</span>
</span>

<div class="search-wrap no-print" style="max-width:240px">
<span class="search-ico">🔍</span>
<input id="doc-search" type="search" placeholder="Cari dokumen…">
</div>

</div>

<table>

<thead>
<tr>
<th style="width:44px">No</th>
<th>Nama Dokumen</th>
</tr>
</thead>

<tbody id="doc-body">
<tr>
<td colspan="2" style="padding:40px;text-align:center;color:var(--muted)">
Memuat data…
</td>
</tr>
</tbody>

</table>

</div>

</main>

<script src="js/data.js"></script>
<script src="js/dus.js"></script>

</body>
</html>
