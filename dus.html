<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Dus – Arsip HK Bhirawa</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* --- TAMPILAN LAYAR (WEB VIEW) --- */
.detail-head {
  display: grid;
  grid-template-columns: 1fr 210px;
  align-items: center;
  padding: 12px 16px 12px 24px;
  min-height: 210px;
  gap: 8px;
  overflow: hidden;
}

.dh-mid {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: flex-start;
  gap: 60px;
}

.badge-tahun-big {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 100px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: -4px;
  flex-shrink: 0;
}

.badge-no-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  align-self: center;
}

.badge-no-lbl {
  font-size: 13px;
  font-weight: 700;
  color: #ffffff;
  opacity: 0.65;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.badge-no-big {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 700;
  font-size: clamp(140px, 19vw, 210px);
  line-height: 1;
  text-align: left;
  white-space: nowrap;
  color: #ffffff;
  letter-spacing: -4px;
}

/* QR web */
.qr-box {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 200px;
  height: 200px;
  flex-shrink: 0;
  background: #ffffff;
  border-radius: 6px;
  padding: 2px;
  box-sizing: border-box;
}
#qr-render {
  width: 196px !important;
  height: 196px !important;
  display: block;
}
#qr-render canvas,
#qr-render img {
  width: 196px !important;
  height: 196px !important;
  display: block;
}

/* --- PRINT VIEW --- */
@media print {
  @page {
    size: A4 portrait;
    margin: 10mm 12mm 10mm 12mm;
  }

  * {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  .site-header, .breadcrumb, .nav-duo, .no-print {
    display: none !important;
  }

  body {
    font-size: 12pt !important;
  }

  /* ── HEADER CARD ── */
  .detail-card {
    border: 1.5px solid #000 !important;
    box-shadow: none !important;
    margin-bottom: 6mm !important;
  }

  .detail-head {
    display: grid !important;
    grid-template-columns: 1fr 148px !important;
    align-items: center !important;
    background: #fff !important;
    padding: 8px 10px 8px 18px !important;
    min-height: 148px !important;
    max-height: 148px !important;
    gap: 8px !important;
    overflow: hidden !important;
    border-bottom: 2px solid #000 !important;
  }

  .dh-mid {
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    gap: 32px !important;
  }

  .badge-tahun-big {
    font-size: 78px !important;
    color: #000 !important;
    letter-spacing: -3px !important;
    line-height: 1 !important;
    flex-shrink: 0 !important;
  }

  .badge-no-wrap {
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    justify-content: center !important;
    align-self: center !important;
  }

  .badge-no-lbl {
    font-size: 11px !important;
    color: #000 !important;
    opacity: 1 !important;
    font-weight: 800 !important;
    margin-bottom: 0 !important;
    letter-spacing: 0.1em !important;
  }

  .badge-no-big {
    font-size: 140px !important;
    color: #000 !important;
    line-height: 0.88 !important;
    letter-spacing: -4px !important;
  }

  /* QR print */
  .qr-box {
    width: 140px !important;
    height: 140px !important;
    padding: 2px !important;
    background: #fff !important;
    border: 2px solid #000 !important;
    border-radius: 0 !important;
    box-sizing: border-box !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    overflow: hidden !important;
  }
  #qr-render,
  #qr-render canvas,
  #qr-render img {
    width: 134px !important;
    height: 134px !important;
    display: block !important;
  }

  /* ── META BAR ── */
  .meta-bar {
    padding: 5px 18px !important;
    gap: 0 !important;
    border-bottom: 1px solid #ccc !important;
    display: flex !important;
    align-items: center !important;
  }
  .meta-item {
    padding: 4px 16px 4px 0 !important;
  }
  .meta-key {
    font-size: 8.5pt !important;
    letter-spacing: 0.08em !important;
    color: #555 !important;
    text-transform: uppercase !important;
    display: block !important;
    line-height: 1.2 !important;
  }
  .meta-val {
    font-size: 10pt !important;
    font-weight: 700 !important;
    color: #000 !important;
    display: block !important;
    line-height: 1.3 !important;
  }

  /* ── TABLE ── */
  .table-wrap {
    border: 1.5px solid #000 !important;
    box-shadow: none !important;
    page-break-inside: avoid !important;
  }

  .table-head {
    padding: 6px 12px !important;
    border-bottom: 1.5px solid #000 !important;
    background: #fff !important;
  }

  .table-head-title {
    font-size: 9pt !important;
    font-weight: 800 !important;
    letter-spacing: 0.08em !important;
    color: #000 !important;
  }

  table {
    width: 100% !important;
    border-collapse: collapse !important;
    table-layout: fixed !important;
  }

  thead th {
    font-size: 8.5pt !important;
    font-weight: 700 !important;
    padding: 5px 10px !important;
    letter-spacing: 0.07em !important;
    text-transform: uppercase !important;
    color: #333 !important;
    border-bottom: 1.5px solid #000 !important;
    background: #f5f5f5 !important;
  }

  thead th:first-child {
    width: 38px !important;
    text-align: center !important;
  }

  /* ── DOCUMENT ROWS — kunci utama ── */
  tbody tr td {
    font-size: 11pt !important;       /* ukuran font nama dokumen */
    font-weight: 600 !important;
    padding: 6px 10px !important;     /* padding atas-bawah per baris */
    line-height: 1.25 !important;
    color: #000 !important;
    border-bottom: 0.5px solid #ddd !important;
    vertical-align: middle !important;
  }

  tbody tr td:first-child {
    text-align: center !important;
    font-size: 9pt !important;
    font-weight: 500 !important;
    color: #555 !important;
    width: 38px !important;
  }

  tbody tr:last-child td {
    border-bottom: none !important;
  }

  tbody tr:nth-child(even) td {
    background: #fafafa !important;
  }
}
</style>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">
      <div class="brand-icon">🗂️</div>
      <div>
        <div class="brand-name">Arsip Akuntansi HK Bhirawa</div>
        <div class="brand-sub">Created By NasZ</div>
      </div>
    </a>
    <div class="header-actions">
      <button class="btn btn-outline btn-sm" onclick="window.print()">🖨️ Print</button>
    </div>
  </div>
</header>

<main class="main">
  <nav class="breadcrumb">
    <a href="index.html">🏠 Beranda</a>
    <span class="bc-sep">›</span>
    <span id="d-num">—</span>
  </nav>

  <div class="nav-duo">
    <a id="nav-prev" class="btn btn-ghost btn-sm" href="#">← Sebelumnya</a>
    <a id="nav-next" class="btn btn-ghost btn-sm" href="#">Berikutnya →</a>
  </div>

  <div class="detail-card">
    <div class="detail-head">
      <div class="dh-mid">
        <span class="badge-tahun-big" id="badge-tahun">—</span>
        <div class="badge-no-wrap">
          <div class="badge-no-lbl">No Dus</div>
          <div class="badge-no-big" id="badge-label">—</div>
        </div>
      </div>
      <div class="qr-box">
        <div id="qr-render"></div>
      </div>
    </div>

    <div class="meta-bar">
      <div class="meta-item">
        <span class="meta-key">Tahun</span>
        <span class="meta-val" id="d-tahun">—</span>
      </div>
      <div class="meta-item">
        <span class="meta-key">Jumlah Dokumen</span>
        <span class="meta-val" id="d-total">—</span>
      </div>
      <div class="meta-item">
        <span class="meta-key">Keterangan</span>
        <span class="meta-val" id="d-title">—</span>
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-head">
      <span class="table-head-title">📄 DAFTAR DOKUMEN — <span id="doc-count">—</span></span>
      <div class="search-wrap no-print" style="max-width:240px">
        <span class="search-ico">🔍</span>
        <input id="doc-search" type="search" placeholder="Cari dokumen…">
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:44px">No</th>
          <th>Nama Dokumen</th>
        </tr>
      </thead>
      <tbody id="doc-body">
        <tr><td colspan="2" style="padding:40px;text-align:center;color:var(--muted)">Memuat data…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/dus.js"></script>
</body>
</html>
