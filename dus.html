<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Dus – Arsip HK Bhirawa</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">
      <div class="brand-icon">🗂️</div>
      <div>
        <div class="brand-name" data-nama>Arsip Akuntansi HK Bhirawa</div>
        <div class="brand-sub"  data-sub>Created By NasZ</div>
      </div>
    </a>
    <div class="header-actions no-print">
      <button class="btn btn-outline btn-sm" onclick="window.print()">🖨️ Print</button>
    </div>
  </div>
</header>

<main class="main">

  <nav class="breadcrumb no-print">
    <a href="index.html">🏠 Beranda</a>
    <span class="bc-sep">›</span>
    <span id="d-num">—</span>
  </nav>

  <div class="nav-duo no-print">
    <a id="nav-prev" class="btn btn-ghost btn-sm" href="#">← Sebelumnya</a>
    <a id="nav-next" class="btn btn-ghost btn-sm" href="#">Berikutnya →</a>
  </div>

  <div class="detail-card">
    <div class="detail-head">
      <div style="flex:1">
        <div class="detail-num"   id="d-num">—</div>
        <div class="detail-title" id="d-title">—</div>
        <div class="detail-ket">★ Dokumen Milik Akuntansi</div>
        <!-- Badge No Dus + Tahun -->
        <div style="display:inline-flex;flex-direction:row;align-items:center;gap:16px;margin-top:20px;">
          <div style="border:2px solid var(--gold);border-radius:8px;padding:10px 28px;background:rgba(201,168,76,0.12);text-align:center;">
            <span style="font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;display:block;">No. Dus</span>
            <span id="badge-label" style="font-family:var(--mono);font-size:52px;font-weight:700;color:white;line-height:1;display:block;">—</span>
          </div>
          <span id="badge-tahun" style="font-family:var(--mono);font-size:36px;font-weight:700;color:white;letter-spacing:0.05em;">—</span>
        </div>
      </div>
      <!-- QR CODE -->
      <div class="qr-box">
        <div id="qr-render"></div>
        <button class="btn btn-outline btn-sm no-print" onclick="window.print()">🖨️ Print</button>
      </div>
    </div>
    <div class="meta-bar">
      <div class="meta-item">
        <span class="meta-key">Tahun</span>
        <span class="meta-val" id="d-tahun">—</span>
      </div>
      <div class="meta-item">
        <span class="meta-key">Jumlah Dokumen</span>
        <span class="meta-val" id="d-total">—</span>
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-head">
      <span class="table-head-title">📄 DAFTAR DOKUMEN — <span id="doc-count">—</span></span>
      <div class="search-wrap no-print" style="max-width:240px">
        <span class="search-ico">🔍</span>
        <input id="doc-search" type="search" placeholder="Cari dokumen…">
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:44px">No</th>
          <th>Nama Dokumen</th>
        </tr>
      </thead>
      <tbody id="doc-body">
        <tr><td colspan="2" style="padding:40px;text-align:center;color:var(--muted)">Memuat data…</td></tr>
      </tbody>
    </table>
  </div>

</main>

<script src="js/data.js"></script>
<script src="js/dus.js"></script>
</body>
</html>
