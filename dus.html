<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Dus – Arsip HK Bhirawa</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* HEADER CARD */
.detail-head {
  display: grid;
  grid-template-columns: 1fr 200px;
  align-items: center;
  padding: 20px 32px;
  min-height: 200px;
  gap: 12px;
  overflow: hidden;
}

/* AREA ANGKA */
.dh-mid {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 24px;
}

/* TAHUN — lebih kecil, tetap terbaca */
.badge-tahun-big {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 66px;
  font-weight: 700;
  white-space: nowrap;
  color: #ffffff;
  opacity: 0.9;
  letter-spacing: -2px;
}

/* NO DUS */
.badge-no-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.badge-no-lbl {
  font-size: 13px;
  font-weight: 700;
  color: #ffffff;
  opacity: 0.75;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

/* ANGKA DUS — besar, auto-scale 1-2-3 digit */
.badge-no-big {
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 700;
  font-size: clamp(110px, 14vw, 170px);
  line-height: 0.85;
  text-align: center;
  white-space: nowrap;
  color: #ffffff;
}

/* QR — terkontrol, tidak keluar kotak */
.qr-box {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 194px;
  height: 194px;
  flex-shrink: 0;
  background: #ffffff;
  border-radius: 6px;
  padding: 3px;
  box-sizing: border-box;
}
#qr-render {
  width: 188px !important;
  height: 188px !important;
  display: block;
}
#qr-render canvas,
#qr-render img {
  width: 188px !important;
  height: 188px !important;
  display: block;
}

/* PRINT MODE */
@media print {
  .site-header,
  .breadcrumb,
  .nav-duo,
  .no-print {
    display: none !important;
  }
  .detail-head {
    grid-template-columns: 1fr 170px;
    padding: 14px 20px;
    min-height: 170px;
    overflow: hidden;
  }
  .badge-tahun-big {
    font-size: 48px;
    color: #000 !important;
    opacity: 1;
  }
  .badge-no-big {
    font-size: clamp(100px, 13vw, 150px);
    color: #000 !important;
  }
  .badge-no-lbl {
    color: #000 !important;
    opacity: 1;
  }
  .qr-box {
    width: 162px;
    height: 162px;
    padding: 3px;
    background: #fff;
    border: 1px solid #ccc;
  }
  #qr-render,
  #qr-render canvas,
  #qr-render img {
    width: 154px !important;
    height: 154px !important;
  }
}
</style>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="index.html">
      <div class="brand-icon">🗂️</div>
      <div>
        <div class="brand-name">Arsip Akuntansi HK Bhirawa</div>
        <div class="brand-sub">Created By NasZ</div>
      </div>
    </a>
    <div class="header-actions">
      <button class="btn btn-outline btn-sm" onclick="window.print()">🖨️ Print</button>
    </div>
  </div>
</header>

<main class="main">
  <nav class="breadcrumb">
    <a href="index.html">🏠 Beranda</a>
    <span class="bc-sep">›</span>
    <span id="d-num">—</span>
  </nav>

  <div class="nav-duo">
    <a id="nav-prev" class="btn btn-ghost btn-sm" href="#">← Sebelumnya</a>
    <a id="nav-next" class="btn btn-ghost btn-sm" href="#">Berikutnya →</a>
  </div>

  <div class="detail-card">
    <div class="detail-head">
      <div class="dh-mid">
        <span class="badge-tahun-big" id="badge-tahun">—</span>
        <div class="badge-no-wrap">
          <div class="badge-no-lbl">No Dus</div>
          <div class="badge-no-big" id="badge-label">—</div>
        </div>
      </div>
      <div class="qr-box">
        <div id="qr-render"></div>
      </div>
    </div>

    <div class="meta-bar">
      <div class="meta-item">
        <span class="meta-key">Tahun</span>
        <span class="meta-val" id="d-tahun">—</span>
      </div>
      <div class="meta-item">
        <span class="meta-key">Jumlah Dokumen</span>
        <span class="meta-val" id="d-total">—</span>
      </div>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-head">
      <span class="table-head-title">
        📄 DAFTAR DOKUMEN — <span id="doc-count">—</span>
      </span>
      <div class="search-wrap no-print" style="max-width:240px">
        <span class="search-ico">🔍</span>
        <input id="doc-search" type="search" placeholder="Cari dokumen…">
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th style="width:44px">No</th>
          <th>Nama Dokumen</th>
        </tr>
      </thead>
      <tbody id="doc-body">
        <tr>
          <td colspan="2" style="padding:40px;text-align:center;color:var(--muted)">
            Memuat data…
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/dus.js"></script>
</body>
</html>
